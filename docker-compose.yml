services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cazenga_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - cazenga_network

  nginx:
    image: nginx:alpine
    container_name: cazenga_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - cazenga_network

  db:
    image: mysql:8.0
    container_name: cazenga_db
    environment:
      MYSQL_DATABASE: cazenga_imoveis
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: cazenga
      MYSQL_PASSWORD: cazenga
    ports:
      - "3306:3306"
    volumes:
      - cazenga_db_data:/var/lib/mysql
    networks:
      - cazenga_network

  node:
    image: node:20-alpine
    container_name: cazenga_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run build"
    networks:
      - cazenga_network

volumes:
  cazenga_db_data:

networks:
  cazenga_network:
